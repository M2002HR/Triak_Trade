<section class="panel backtest-command-center">
  <div class="section-head">
    <div>
      <p class="eyebrow">Backtest Control</p>
      <h2>Run A Real Channel Backtest</h2>
      <p class="subtle">
        Enter a Telegram channel and a date range. The dashboard will run the real history fetch,
        classify each message, fetch market data, simulate trades, and stream every step live.
      </p>
    </div>
    <div class="preset-cluster" role="group" aria-label="Backtest date presets">
      <button type="button" class="ghost-button" data-preset-hours="24">Last 24h</button>
      <button type="button" class="ghost-button" data-preset-hours="72">Last 72h</button>
      <button type="button" class="ghost-button" data-preset-hours="168">Last 7d</button>
    </div>
  </div>

  <form id="backtest-live-form" class="backtest-form-grid">
    <label class="field span-2">Telegram Channel
      <input
        id="backtest-channel"
        name="channel"
        value="{{ default_channel }}"
        placeholder="@Tofan_Trade or https://t.me/Tofan_Trade"
        autocomplete="off"
      >
      <span class="help-text">Username, <code>@channel</code>, or full Telegram link. Optional when a start message link is provided below.</span>
    </label>

    <label class="field">Start Date &amp; Time
      <input id="backtest-from-date" name="from_date" type="datetime-local" required>
    </label>

    <label class="field">End Date &amp; Time
      <input id="backtest-to-date" name="to_date" type="datetime-local" required>
    </label>

    <label class="field span-2">Start From Message Link
      <input
        id="backtest-start-message-link"
        name="start_message_link"
        placeholder="https://t.me/Tofan_Trade/5880"
        autocomplete="off"
      >
      <span class="help-text">Optional. If provided, history processing starts from this message onward in the same channel.</span>
    </label>

    <label class="field">Interval
      <select id="backtest-interval" name="interval">
        <option value="1m">1m</option>
        <option value="5m">5m</option>
        <option value="15m">15m</option>
        <option value="1h">1h</option>
      </select>
    </label>

    <label class="field">Max Messages
      <input id="backtest-max-messages" name="max_messages" type="number" min="1" step="1" value="1000" required>
    </label>

    <label class="toggle-card">
      <input
        id="backtest-use-ai"
        name="use_ai"
        type="checkbox"
        {% if bootstrap.default_use_ai %}checked{% endif %}
      >
      <span>
        <strong>Use AI Classifier</strong>
        <small>Falls back to regex when AI is disabled or unavailable.</small>
      </span>
    </label>

    <label class="toggle-card">
      <input
        id="backtest-send-log-channel"
        name="send_log_channel"
        type="checkbox"
        {% if bootstrap.default_send_log_channel %}checked{% endif %}
      >
      <span>
        <strong>Send Telegram Run Logs</strong>
        <small>Send aggregate updates to the Telegram log channel.</small>
      </span>
    </label>

    <label class="toggle-card span-2">
      <input
        id="backtest-log-per-message"
        name="log_per_message"
        type="checkbox"
        {% if bootstrap.default_log_per_message %}checked{% endif %}
      >
      <span>
        <strong>Send Per-Message Telegram Trace</strong>
        <small>Send one formatted Telegram log message for every Telegram message processed in the channel.</small>
      </span>
    </label>

    <div class="action-row span-2">
      <button id="backtest-start-button" class="button launch-button" type="submit">
        Start Backtest
      </button>
      <div id="backtest-form-status" class="inline-status" aria-live="polite"></div>
    </div>
  </form>
</section>
