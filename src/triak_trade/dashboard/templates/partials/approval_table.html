<div class="panel">
  {% if pending_actions %}
    <table>
      <tr><th>Action ID</th><th>Signal</th><th>Type</th><th>Risk</th><th>Decision</th></tr>
      {% for action in pending_actions %}
        <tr>
          <td>{{ action.action_id }}</td>
          <td>{{ action.signal_id }}</td>
          <td>{{ action.action_type }}</td>
          <td>{{ action.risk_increasing }}</td>
          <td>Record decision only. No execution.</td>
        </tr>
      {% endfor %}
    </table>
  {% else %}
    <p class="empty">{{ empty_state }}</p>
  {% endif %}
</div>
