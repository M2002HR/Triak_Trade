services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: triak_trade
      MYSQL_USER: triak
      MYSQL_PASSWORD: triak_local_password
      MYSQL_ROOT_PASSWORD: root_local_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
