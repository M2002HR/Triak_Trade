services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: triak_trade
      MYSQL_USER: triak
      MYSQL_PASSWORD: triak_local_password
      MYSQL_ROOT_PASSWORD: root_local_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  ai-gateway:
    image: triak-ajil-gateway:local
    build:
      context: ./external/Ajil_Unified_AI_Gateway
      dockerfile: Dockerfile
      network: ${UAG_DOCKER_BUILD_NETWORK:-default}
      args:
        HTTP_PROXY: ${UAG_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${UAG_BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${UAG_BUILD_ALL_PROXY:-}
        NO_PROXY: ${UAG_BUILD_NO_PROXY:-}
        PIP_INDEX_URL: ${UAG_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${UAG_PIP_EXTRA_INDEX_URL:-}
    restart: unless-stopped
    env_file:
      - ./.env.local
    command: ["python3", "/triak_scripts/run_ajil_gateway.py"]
    volumes:
      - ./scripts/docker/run_ajil_gateway.py:/triak_scripts/run_ajil_gateway.py:ro
      - ./src:/triak_src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      UAG_REDIS_URL: ${UAG_REDIS_URL_DOCKER:-redis://redis:6379/0}
      UAG_PROXY_URL: ${UAG_PROXY_URL_DOCKER:-}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=8).read()"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  dashboard:
    image: triak-trade:local
    build:
      context: .
      dockerfile: Dockerfile
      network: ${UAG_DOCKER_BUILD_NETWORK:-default}
      args:
        HTTP_PROXY: ${UAG_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${UAG_BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${UAG_BUILD_ALL_PROXY:-}
        NO_PROXY: ${UAG_BUILD_NO_PROXY:-}
        PIP_INDEX_URL: ${UAG_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${UAG_PIP_EXTRA_INDEX_URL:-}
    restart: unless-stopped
    env_file:
      - ./.env.local
    command: ["python3", "scripts/docker/run_service.py", "dashboard"]
    volumes:
      - ./.env.local:/app/.env.local:ro
      - ./.sessions:/app/.sessions
      - ./runtime:/app/runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-mysql+pymysql://triak:triak_local_password@mysql:3306/triak_trade?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL_DOCKER:-http://ai-gateway:8080}
      TELEGRAM_SESSION_DIR: ${TELEGRAM_SESSION_DIR_DOCKER:-/app/.sessions}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  redis_data:
